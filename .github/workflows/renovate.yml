name: Renovate

on:
  schedule:
    # Weekly, Monday 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug

permissions:
  contents: read

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          # Required so the github-actions manager can update workflow files.
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Renovate
        uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765  # v46.1.17
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Commit via the GitHub API so commits are attributed to the app.
          RENOVATE_PLATFORM_COMMIT: "enabled"
          RENOVATE_ONBOARDING: "false"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
